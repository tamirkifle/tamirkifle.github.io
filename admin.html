<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - tamir.info</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Site Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Admin JS -->
  <!-- JSZip for exporting all files -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/admin.js" defer></script>
</head>
<body class="admin-layout">

  <!-- Admin Header -->
  <header class="admin-header">
    <h1>✍️ tamir.info Admin</h1>
    <div class="btn-group">
      <button class="btn" id="btn-export-all">Export All Files</button>
      <button class="btn btn-danger" id="btn-reset-data" title="Discard browser edits and reload from disk">Reset Local Data</button>
      <button class="btn btn-primary" id="btn-new-post">New Post</button>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="admin-tabs">
    <button class="admin-tab active" data-tab="posts">All Posts</button>
    <button class="admin-tab" data-tab="editor">Editor</button>
  </nav>

  <!-- Tab Content: Post List -->
  <div id="posts-tab">
    <div class="admin-post-list" id="admin-post-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Tab Content: Editor -->
  <div id="editor-tab" hidden>
    <div class="admin-form">

      <!-- Title + Slug -->
      <div class="form-row">
        <div class="form-group">
          <label for="post-title">Title</label>
          <input type="text" class="form-input" id="post-title" placeholder="Post title">
        </div>
        <div class="form-group">
          <label for="post-slug">Slug</label>
          <input type="text" class="form-input" id="post-slug" placeholder="auto-generated-slug">
        </div>
      </div>

      <!-- Date + Read Time -->
      <div class="form-row">
        <div class="form-group">
          <label for="post-date">Date</label>
          <input type="date" class="form-input" id="post-date">
        </div>
        <div class="form-group">
          <label for="post-read-time">Read Time (min)</label>
          <input type="number" class="form-input" id="post-read-time" min="1" placeholder="5">
        </div>
      </div>

      <!-- Summary -->
      <div class="form-group">
        <label for="post-summary">Summary</label>
        <textarea class="form-input" id="post-summary" rows="2" placeholder="Brief summary of the post"></textarea>
      </div>

      <!-- Toggles -->
      <div class="form-toggles">
        <div class="toggle-group">
          <input type="checkbox" id="post-public">
          <label for="post-public">Public</label>
        </div>
        <div class="toggle-group">
          <input type="checkbox" id="post-featured">
          <label for="post-featured">Featured</label>
        </div>
      </div>

      <!-- Tags -->
      <div class="form-group">
        <label for="post-tags">Tags</label>
        <input type="text" class="form-input" id="post-tags" placeholder="rust, ml, systems - comma separated">
      </div>

      <!-- Media insert helper -->
      <div class="btn-group">
        <button class="btn" id="btn-insert-image">Insert Image</button>
        <button class="btn" id="btn-insert-video">Insert Video</button>
      </div>

      <!-- Editor + Preview -->
      <div class="editor-layout">
        <div class="editor-pane">
          <div class="pane-header">Markdown</div>
          <textarea id="post-body" placeholder="Write your post in Markdown…"></textarea>
        </div>
        <div class="preview-pane">
          <div class="pane-header">Preview</div>
          <div class="preview-content post-content" id="post-preview"></div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-save-post">Save Post</button>
        <button class="btn" id="btn-download-md">Download .md</button>
        <button class="btn" id="btn-cancel">Cancel</button>
      </div>

    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

</body>
</html>
